version: '3.8'

services:
  # 1. Frontend (Nginx serving React App)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      backend:
         condition: service_healthy

  # 2. Backend (Node.js API)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - PORT=4000
      - REDIS_URL=${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 3. Database (PostgreSQL)
  db:
      image: postgres:15-alpine
      restart: always
      environment:
        - POSTGRES_USER=user
        - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
        - POSTGRES_DB=overseek
      volumes:
        - postgres_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U user -d overseek"]
        interval: 10s
        timeout: 5s
        retries: 5

  # 4. Redis (Cache)
  redis:
    image: redis:alpine
    restart: always
    healthcheck:
        test: ["CMD", "redis-cli", "ping"]
        interval: 10s
        timeout: 5s
        retries: 5

volumes:
  postgres_data:
