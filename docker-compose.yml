version: '3.8'

services:
  # 1. Frontend (Nginx serving React App)
  app-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    depends_on:
      app-api:
        condition: service_healthy

  # 2. Backend (Node.js API)
  app-api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgres://user:${POSTGRES_PASSWORD:-password}@db:5432/overseek
      - PORT=4000
      - REDIS_URL=${REDIS_URL}
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: "wget --no-verbose --tries=1 --spider http://127.0.0.1:4000/health || exit 1"
      interval: 30s
      timeout: 10s
      retries: 5

  # 3. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=overseek
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d overseek" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 4. Redis (Cache)
  redis:
    image: redis:alpine
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 5. Object Storage (MinIO)
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-password}
    volumes:
      - minio_data:/data

  # 6. Proxy (Traefik) - Optional ingress
  proxy:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:8080"
    ports:
      - "8090:8080" # Map host 8090 to Traefik 8080 (Avoid host 80)
      - "8888:8080" # Dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  postgres_data:
  minio_data:
